# 客户服务 Agent 基础设施依赖
# 启动顺序：mysql / redis / qdrant 三者相互独立，均由后端服务依赖；
# 后端启动时应等待三者 healthy（见 services.app.depends_on）。
# 单独启动基础设施时可按需使用：docker compose up -d mysql redis qdrant

services:
  mysql:
    image: mysql:8.0
    container_name: myagent-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: myagent
      MYSQL_USER: myagent
      MYSQL_PASSWORD: myagent
      TZ: Asia/Shanghai
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - myagent-net

  redis:
    image: redis/redis-stack:latest
    container_name: myagent-redis
    restart: unless-stopped
    ports:
      - "6379:6379"      # Redis 服务端口
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - myagent-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: myagent-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"      # REST 端口
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # qdrant 镜像内置最小系统，无 wget/curl/nc，故用 bash 的 /dev/tcp 探活 /healthz
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/6333 && printf 'GET /healthz HTTP/1.0\\r\\n\\r\\n' >&3 && grep -q '200' <&3"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - myagent-net

  # 后端服务：构建 Dockerfile 镜像并接入同一网络
  app:
    build: .
    container_name: myagent-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # 加载 config/llm_config.docker.yml（下方以只读卷挂载，不烘焙进镜像）；
      # 该文件主机已指向 docker 服务名（mysql/qdrant/redis），故容器内可用到底座依赖。
      APP_ENV: docker
      # 图态 checkpointer 走 redis 服务：连接信息从 config/llm_config.docker.yml 的
      # redis 段读取（enabled/host/port/db/password），不再依赖 REDIS_URL 环境变量。
      # BM25 稀疏向量依赖 fastembed 的 Qdrant/bm25 模型。fastembed 默认把权重缓存到
      # 容器内的 /tmp/fastembed_cache（临时目录，重建即丢），故这里把缓存根指向挂载的
      # hf_cache 卷（/root/.cache/huggingface），让模型跨容器重建保留、只下载一次。
      # 注：fastembed 读 FASTEMBED_CACHE_PATH（非 HF_HUB_CACHE）决定缓存位置。
      FASTEMBED_CACHE_PATH: /root/.cache/huggingface
      # 模型底层走 huggingface_hub 下载；容器无法直连 huggingface.co，故指向可达镜像，
      # 首次启动从镜像拉取并缓存到上述 hf_cache 卷，避免卡死在连 HF。
      HF_ENDPOINT: https://hf-mirror.com
    volumes:
      # 密钥配置：宿主机已存在的 config/llm_config.docker.yml 只读挂入容器
      - ./config/llm_config.docker.yml:/app/config/llm_config.docker.yml:ro
      # HF / fastembed 模型缓存：跨容器重建保留，首次下载后不再联网
      - hf_cache:/root/.cache/huggingface
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - myagent-net

  # 前端：Vue3 + Vite 开发服务器（npm run dev，带 HMR）。
  # 开发态：依赖烤进镜像，源码以卷挂入实现热更新；代理目标经 VITE_PROXY_TARGET
  # 指向同网络内的后端服务 app:8000（compose 服务名），宿主机浏览器访问 5173。
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: myagent-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      # 容器内 Vite 代理目标：同网络的 app 服务（端口 8000）。
      VITE_PROXY_TARGET: http://app:8000
      # 源码以卷挂入时，轮询更能可靠触发 HMR 文件变更事件。
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      # 源码挂入实现热更新；匿名卷 /app/node_modules 保留镜像内已装依赖，
      # 避免覆盖宿主 node_modules（平台/版本差异）。
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - app
    networks:
      - myagent-net

  # 可观测：自托管 Prometheus（抓取） + Grafana（可视化），均免费、数据不出本机
  prometheus:
    image: prom/prometheus:latest
    container_name: myagent-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"      # Prometheus UI
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    # 后端在宿主机运行时，让容器能访问宿主 8000 端口（Linux 下 host-gateway 映射）
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - myagent-net

  grafana:
    image: grafana/grafana:latest
    container_name: myagent-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"      # Grafana UI（默认 admin/admin）
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - myagent-net

networks:
  myagent-net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  qdrant_data:
  prometheus_data:
  grafana_data:
  hf_cache:


# - Dockerfile = 怎么做镜像（基础镜像 python:3.10-slim + pip install + uvicorn 启动）
# - docker-compose.yml = 怎么编排（app 引用 Dockerfile 构建，并接 mysql/redis/qdrant 网络、注入环境变量、挂卷）
# - .dockerignore = 构建时别把前端/测试/密钥拷进镜像/密钥拷进镜像/测试/密钥拷进镜像
