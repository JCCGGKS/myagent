# 客户服务 Agent 基础设施依赖
# 启动顺序：mysql / redis / qdrant 三者相互独立，均由后端服务依赖；
# 后端启动时应等待三者 healthy（见 services.app.depends_on）。
# 单独启动基础设施时可按需使用：docker compose up -d mysql redis qdrant

services:
  mysql:
    image: mysql:8.0
    container_name: myagent-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: myagent
      MYSQL_USER: myagent
      MYSQL_PASSWORD: myagent
      TZ: Asia/Shanghai
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - myagent-net

  redis:
    image: redis/redis-stack:latest
    container_name: myagent-redis
    restart: unless-stopped
    ports:
      - "6379:6379"      # Redis 服务端口
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - myagent-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: myagent-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"      # REST 端口
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - myagent-net

  # 后端服务：构建 Dockerfile 镜像并接入同一网络
  app:
    build: .
    container_name: myagent-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # 加载 config/llm_config.local.yml（下方以只读卷挂载，不烘焙进镜像）
      APP_ENV: local
      # 图态 checkpointer 走 redis 服务（app 仅读 REDIS_URL 这个环境变量）
      REDIS_URL: redis://redis:6379
      # BM25 稀疏向量依赖 fastembed 的 Qdrant/bm25 模型，底层走 huggingface_hub。
      # 容器无法直连 huggingface.co，故指向可达镜像，首次启动从镜像拉取并缓存到
      # hf_cache 卷（见下方 volumes），避免每次重建容器重复下载、也避免卡死在连 HF。
      HF_ENDPOINT: https://hf-mirror.com
    volumes:
      # 密钥配置：宿主机已存在的 config/llm_config.local.yml 只读挂入容器
      - ./config/llm_config.local.yml:/app/config/llm_config.local.yml:ro
      # HF 模型缓存：跨容器重建保留，首次下载后不再联网
      - hf_cache:/root/.cache/huggingface
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - myagent-net

  # 可观测：自托管 Prometheus（抓取） + Grafana（可视化），均免费、数据不出本机
  prometheus:
    image: prom/prometheus:latest
    container_name: myagent-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"      # Prometheus UI
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    # 后端在宿主机运行时，让容器能访问宿主 8000 端口（Linux 下 host-gateway 映射）
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - myagent-net

  grafana:
    image: grafana/grafana:latest
    container_name: myagent-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"      # Grafana UI（默认 admin/admin）
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - myagent-net

networks:
  myagent-net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  qdrant_data:
  prometheus_data:
  grafana_data:
  hf_cache:
