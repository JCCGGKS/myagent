# LLM 配置（test 环境）
llm:
  # 是否启用 LLM 意图识别兜底
  enabled: false

  # OpenAI / 兼容 API 的密钥（为空时自动禁用）
  api_key: ""

  # 使用的模型名称
  model: gpt-4o

  # 兼容 API 的 base URL（设为 null 则使用官方端点）
  base_url: null

  # 请求超时时间（秒）
  timeout_seconds: 20.0

  # LLM 意图识别的最低置信度阈值（低于此值的结果会被丢弃）
  confidence_threshold: 0.7

# 日志配置
logging:
  # 日志级别：DEBUG | INFO | WARNING | ERROR
  level: INFO

  # 是否输出到控制台
  console: true

  # 是否写入文件
  file: true

  # 日志文件路径（相对于项目根目录）
  file_path: logs/app.log
