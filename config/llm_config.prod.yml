# =============================================================
# 生产环境配置模板（prod）
# -------------------------------------------------------------
# 部署时复制并填入你自己的值：
#   cp config/llm_config.prod.yml config/llm_config.prod.yml   # 已在 .gitignore
# 所有带 <...> 的字段为占位符，必须由你提供（密钥 / 主机地址 / 账号）。
# 端口、数据库名、算法等已填合理默认值，可按实际拓扑调整。
# 生产环境建议启用 LLM 兜底（enabled: true）并填入真实 key。
# =============================================================

llm:
  # 是否启用 LLM 意图识别兜底（生产建议 true）
  enabled: false

  # OpenAI / 兼容 API 的密钥（填入生产 key）
  api_key: <your-llm-api-key>

  # 使用的模型名称（按你的网关支持填写）
  model: gpt-5.5

  # 兼容 API 的 base URL（第三方网关地址）
  base_url: <your-openai-compatible-base-url>

  # 请求超时时间（秒）
  timeout_seconds: 20.0

  # LLM 意图识别的最低置信度阈值（低于此值的结果会被丢弃）
  confidence_threshold: 0.7

  # 生成参数（可选；不填则用默认值）
  # 是否启用思维链（仅 Qwen3 等推理模型支持，经 extra_body 下发）。
  # 默认 false（关闭）以避免单次对话的推理开销；需强推理时置 true。
  enable_thinking: false
  # 采样温度（0~2，越大越随机）；留空用模型默认。
  # temperature: 0.3
  # 单次回复最大 token 数；留空用模型默认。
  # max_tokens: 1024
  # 核采样概率阈值（0~1）；留空用模型默认。
  # top_p: 0.9

# RAG 配置
rag:
  # 检索策略：bm25 | semantic | hybrid
  retrieval_strategy: "hybrid"

  # 返回结果数量
  top_k: 5

  # 最小匹配度阈值（单一字段，读出即用，不做归一化映射）
  # 不同检索策略适用量纲不同，前端按 retrieval_strategy 控制可输入范围：
  #   - bm25    ：BM25(Modifier.IDF) 原始分数 0~10 量级，强命中约 4~6
  #   - semantic：余弦相似度 0~1
  #   - hybrid  ：RRF 融合分数约 1/(k+rank)，k=60 时最大 ~0.016，应接近 0
  # 默认 0.0 表示不按阈值过滤，仅取 top_k。
  min_score_threshold: 0.0

  # 切块参数（入库时生效，影响检索质量）
  chunk_size: 800        # 每个文本块最大字符数
  chunk_overlap: 100     # 硬切时相邻块重叠字符数
  min_chunk_size: 50     # 丢弃短于此长度的碎块

  # RRF 融合常数 k（仅 hybrid 策略生效），默认 60
  rrf_k: 60

  # Rerank 配置（与 embedding 各自独立 base_url / api_key / model）
  rerank:
    # 是否启用 Rerank
    enabled: false
    # 重排网关地址（OpenAI 兼容 /v1，必须由配置显式提供，无默认值；启用时必填）
    base_url: <your-rerank-base-url>
    # DashScope API Key（启用时填入）
    api_key: <your-rerank-api-key>
    # Rerank 模型名称（启用时必填）
    model: <your-rerank-model>

# Redis 配置
redis:
  # 连接地址（生产填真实主机，如 redis.xxx.internal）
  host: <your-redis-host>
  # 服务端口
  port: 6379
  # 数据库编号
  db: 0
  # 访问密码（生产建议设置）
  password: <your-redis-password>
  # 连接超时（秒）
  socket_timeout: 5.0
  # 是否启用（关闭时后端回退到内存存储）
  enabled: true

# MySQL 配置
mysql:
  # 连接地址（生产填真实主机）
  host: <your-mysql-host>
  # 服务端口
  port: 3306
  # 数据库名
  database: myagent
  # 用户名
  user: <your-mysql-user>
  # 密码
  password: <your-mysql-password>
  # 连接池大小
  pool_size: 5
  # 连接超时（秒）
  connect_timeout: 10
  # 是否启用（关闭时后端回退到内存存储）
  enabled: true

# JWT 配置
jwt:
  # 签名密钥（生产环境务必替换为强随机值，切勿使用示例值）
  secret: <your-jwt-secret>
  # 签名算法
  algorithm: "HS256"
  # 登录 token 有效期（分钟）
  access_expire_minutes: 1440
  # 找回密码 token 有效期（分钟）
  reset_expire_minutes: 15

# SMTP 配置（找回密码邮件）
smtp:
  # 是否启用真实发送
  enabled: false
  # SMTP 服务器地址（启用时填入）
  host: <your-smtp-host>
  # SMTP 端口（465 通常为 SSL，587 通常为 STARTTLS）
  port: 465
  # 登录用户名（启用时填入）
  user: <your-smtp-user>
  # 登录密码 / 授权码（启用时填入）
  password: <your-smtp-password>
  # 发件人地址
  from_addr: "no-reply@myagent.local"
  # 是否使用 TLS
  use_tls: true

# Embedding 配置（基础设施，顶层独立配置块，与 llm / qdrant 同级；不由前端 PUT /rag/config 管理）
embedding:
  # 嵌入网关地址（OpenAI 兼容，如 DashScope 兼容模式；填入生产地址）
  base_url: <your-embedding-base-url>
  # API Key（填入生产 key）
  api_key: <your-embedding-api-key>
  # 嵌入模型名称（如 DashScope text-embedding-v4）
  model: "text-embedding-v4"
  # 稠密向量维度，须与模型实际输出维度一致，且须等于 qdrant.vector_size。
  # text-embedding-v4 输出 1024 维；若改用 OpenAI text-embedding-3-small 则为 1536。
  vector_size: 1024

# Qdrant 配置
qdrant:
  # 连接地址（生产填真实主机，如 qdrant.xxx.internal）
  host: <your-qdrant-host>
  # REST 端口
  port: 6333
  # 集合（collection）名称
  collection_name: customer_service_knowledge
  # 向量维度（与嵌入模型对齐）
  vector_size: 1024
  # 距离度量方式：cosine | dot_product | euclidean
  distance: cosine
  # API Key（为空则不鉴权）
  api_key: <your-qdrant-api-key>
  # 是否启用（关闭时检索返回空结果，不连 Qdrant、不报错）
  enabled: true

# 日志配置
logging:
  # 日志级别：DEBUG | INFO | WARNING | ERROR
  level: WARNING

  # 是否输出到控制台
  console: true

  # 是否写入文件
  file: true

  # 日志输出目录（相对于项目根目录）
  # 文件命名：app-YYYY-MM-DD.log，按天切分，保留 14 天
  dir_path: logs

# 上下文管理配置（对话摘要缓冲，不由前端控制）
context:
  # 活动窗口大小：仅保留最近 N 条消息原样，窗口外折叠进 running_summary
  max_recent_messages: 6
  # running_summary 退化模式（无 LLM 折叠器）下的最大长度，避免无限增长
  max_summary_chars: 2000
