# 路由规则（数据驱动）：列表顺序即匹配优先级，命中第一个即返回。
# 字段说明：
#   intent                       主意图
#   sub_intent                   默认子意图
#   keywords                     触发关键词（命中其一即匹配）
#   emotion                      可选：当情绪等于该值时也触发（与 keywords 取或）
#   action_keywords              可选：命中则改用 action_sub_intent
#   action_sub_intent            可选：action_keywords 命中时的子意图
#   confidence                   固定置信度（无 with_order 字段时）
#   confidence_with_order        有 order_id 时的置信度
#   confidence_without_order     无 order_id 时的置信度
#   needs_order                  为 true 时：有 order_id 置信度取 with_order，否则取 without_order；needs_clarification = (order_id is None)
#   needs_clarification_when_no_order  为 true 时：needs_clarification = (命中关键词或动作词 且 order_id 为 None)
#       —— 覆盖「退款/退货/不想要了」等基础关键词与「退掉/我要退款」等强动作词，缺单号即澄清；
#          仅对明确咨询型话术（退款规则/怎么退，见上方优先规则）不强制澄清。
#   risk_level / handoff_reason / handoff_reason_emotion  透传到 IntentResult
routing_rules:
  - intent: handoff_service
    sub_intent: handoff_service.request_human
    keywords:
      - 转人工
      - 人工客服
      - 找人工
      - 人工
      - 真人
      - 客服
    confidence: 0.99
    handoff_reason: user_request

  # —— 细分子意图规则（放在通用规则前拦截，确定性产出，避免 LLM 塌缩到默认子意图）——
  - intent: order_query
    sub_intent: order_query.modify_address
    keywords: [改地址, 修改地址]
    confidence: 0.88
  - intent: order_query
    sub_intent: order_query.apply_invoice
    keywords: [开发票]
    confidence: 0.88
  - intent: logistics
    sub_intent: logistics.lost_package
    keywords: [丢件, 包裹丢了]
    confidence_with_order: 0.9
    confidence_without_order: 0.82
    needs_order: true
  - intent: logistics
    sub_intent: logistics.delayed
    keywords: [延迟, 配送太慢]
    confidence_with_order: 0.9
    confidence_without_order: 0.82
    needs_order: true
  - intent: after_sale_refund
    sub_intent: after_sale_refund.no_reason_return
    # 注意：仅匹配「实际办理无理由退货」的强动作表述（无理由退+货），避免抢走
    # 「七天无理由怎么退」这类咨询（金标归 consult_policy）。
    keywords: [无理由退货, 无理由退]
    confidence: 0.88
  - intent: after_sale_refund
    sub_intent: after_sale_refund.wrong_goods
    keywords: [错货, 发错, 收到错货]
    confidence: 0.88
  - intent: after_sale_refund
    sub_intent: after_sale_refund.damage_refund
    keywords: [商品损坏, 损坏了, 收到的东西坏了, 坏了要退, 质量问题要退]
    confidence: 0.88
  - intent: logistics
    sub_intent: logistics.not_received
    keywords:
      - 物流
      - 快递
      - 配送
      - 到哪了
      - 到哪儿了
      - 什么时候到
      - 丢件
      - 延迟
      - 没收到
      - 签收
      - 派送
    confidence_with_order: 0.9
    confidence_without_order: 0.78
    needs_order: true

  - intent: order_query
    sub_intent: order_query.query_status
    keywords:
      - 查订单
      - 订单状态
      - 我的订单
      - 我的单
      - 查单
      - 发货了吗
      - 订单
      - 改地址
      - 修改地址
      - 开发票
      - 订单详情
    confidence_with_order: 0.9
    confidence_without_order: 0.76
    needs_order: true

  # 退款咨询优先规则：含「规则/政策/流程/条件/怎么退/吗」等探索性表述，
  # 即使嵌入「我要退款/帮我退款」也归 consult_policy（与金标一致）。
  # 必须置于下方通用 consult_policy 规则之前（routing 为 first-match-wins）。
  # 仅覆盖咨询型话术，不抢走「我要退款/申请退款/退货退款」等强动作表述。
  - intent: after_sale_refund
    sub_intent: after_sale_refund.consult_policy
    keywords:
      - 退款规则
      - 退货规则
      - 退款政策
      - 退货政策
      - 怎么退
      - 怎么退款
      - 怎么退货
      - 如何退
      - 如何退款
      - 退款流程
      - 退货流程
      - 退换流程
      - 退款条件
      - 退货条件
      - 能不能退
      - 能不能退款
      - 退款吗
      - 退货吗
      - 七天无理由怎么退
      - 七天无理由如何退
    confidence_with_order: 0.92
    confidence_without_order: 0.85

  - intent: after_sale_refund
    sub_intent: after_sale_refund.consult_policy
    action_sub_intent: after_sale_refund.request_refund
    keywords:
      - 退货
      - 售后
      - 退换
      - 换货
      - 退款
      - 退货退款
      - 不想要了
      - 不想要
      - 不要了
      - 质量
      - 坏了
      - 质量问题
    action_keywords:
      - 我要退款
      - 申请退款
      - 帮我退款
      - 直接退
      - 帮退一下
      - 退掉
      - 后悔了
      - 申请退
      - 退货退款
      - 这单不想要了退了吧
      - 不想要了退了吧
      - 我要退货
      - 申请退货
    confidence_with_order: 0.88
    confidence_without_order: 0.8
    needs_clarification_when_no_order: true

  # —— 投诉规则必须置于具体意图（订单/物流/退款）之后：first-match-wins 下，
  # 若「气死，查一下订单」这类「情绪词 + 具体意图词」命中投诉的「气死」关键词，
  # 会抢走 order_query，导致后续仅说「A1001」时无法按槽位跟进识别为订单查询。
  # 放最后可保证：含具体意图词时优先命中具体意图，纯投诉（投诉/差评/12315/气死
  # 且无订单物流退款词）才回落到投诉。——
  - intent: complaint
    sub_intent: complaint.compensate
    keywords: [赔偿, 赔付]
    confidence: 0.92
    handoff_reason: complaint

  - intent: complaint
    sub_intent: complaint.service_complaint
    keywords:
      - 投诉
      - 差评
      - 赔付
      - 赔偿
      - 太差了
      - 不处理
      - 没用
      - 气死
      - 气死我了
      - 越想越气
      - 态度
      - 受不了
      - "12315"
      - 消费者协会
    confidence: 0.95
    handoff_reason: complaint

  # —— 纯问候/闲聊兜底（必须置于最后：仅当其它规则均未命中时触发）——
  - intent: unrecognize
    sub_intent: unrecognize.unknown
    keywords: [你好, 在吗, 有人吗, hello, 嗨, 在不在, 在么, 随便聊聊]
    confidence: 0.95

# 情绪关键词（供 _detect_emotion 使用，不参与意图路由）
# 仅分三类：negative / positive / neutral（默认）。命中 negative 视为负面情绪。
emotion_keywords:
  negative:
    - 生气
    - 差评
    - 太慢了
    - 没人处理
    - 无语
    - 受不了
    - 受不了了
    - 太过分了
    - 急
    - 尽快
    - 马上
    - 现在就
    - 急死了
    - 要死了
    - 立刻
    - 立刻就要
    - 加急
    - 不明白
    - 什么意思
    - 没懂
    - 看不懂
    - 啥意思
    - 怎么操作
    - 咋办
    - 担心
    - 焦虑
    - 怎么办
    - 还没到
    - 很担心
    - 咋还没到
    - 能不能到
    - 气死
    - 太差了
    - 投诉
  positive:
    - 谢谢
    - 感谢
    - 满意
    - 好的
    - 棒
    - 赞
    - 辛苦了
    - 太好了
    - 没问题
