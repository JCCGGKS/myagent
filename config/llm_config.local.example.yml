# LLM 配置（本地覆盖，参考模板）
llm:
  # 是否启用 LLM 意图识别兜底
  enabled: true

  # OpenAI / 兼容 API 的密钥（替换为自己真实的 key）
  api_key: replace-with-local-key

  # 使用的模型名称
  model: gpt-5.5

  # 兼容 API 的 base URL（第三方网关地址）
  base_url: https://your-openai-compatible-gateway.example.com/v1

  # 请求超时时间（秒）
  timeout_seconds: 20.0

  # LLM 意图识别的最低置信度阈值（低于此值的结果会被丢弃）
  confidence_threshold: 0.7

# RAG 配置
rag:
  # 检索策略：bm25 | semantic | hybrid
  retrieval_strategy: "hybrid"

  # 返回结果数量
  top_k: 5

  # BM25 策略配置
  bm25:
    # 最小匹配度阈值（BM25 原始分数，低于此值的结果会被丢弃）
    min_score_threshold: 5.0

  # 语义向量策略配置
  semantic:
    # 距离度量方式：cosine | dot_product | euclidean
    metric: "cosine"

    # 最小匹配度阈值（余弦相似度范围 -1~1，低于此值的结果会被丢弃）
    min_score_threshold: 0.7

  # 混合检索配置
  hybrid:
    # 融合方法：rrf | weighted
    fusion_method: "rrf"

    # 加权融合的权重（仅当 fusion_method=weighted 时生效）
    weighted_alpha: 0.5

    # 最小匹配度阈值（融合后的 RRF 分数，低于此值的结果会被丢弃）
    min_score_threshold: 0.5

  # Rerank 配置
  rerank:
    # 是否启用 Rerank
    enabled: false

    # Rerank 模型名称（启用时必填）
    model: ""

# Redis 配置
redis:
  # 连接地址（Docker Compose 内用服务名 redis）
  host: redis
  # 服务端口
  port: 6379
  # 数据库编号
  db: 0
  # 访问密码（为空则不鉴权）
  password: ""
  # 连接超时（秒）
  socket_timeout: 5.0
  # 是否启用（关闭时后端回退到内存存储）
  enabled: true

# MySQL 配置
mysql:
  # 连接地址（Docker Compose 内用服务名 mysql）
  host: mysql
  # 服务端口
  port: 3306
  # 数据库名
  database: myagent
  # 用户名
  user: myagent
  # 密码
  password: myagent
  # 连接池大小
  pool_size: 5
  # 连接超时（秒）
  connect_timeout: 10
  # 是否启用（关闭时后端回退到内存存储）
  enabled: true

# JWT 配置
jwt:
  # 签名密钥（生产环境务必替换为强随机值）
  secret: "change-me-in-prod"
  # 签名算法
  algorithm: "HS256"
  # 登录 token 有效期（分钟）
  access_expire_minutes: 1440
  # 找回密码 token 有效期（分钟）
  reset_expire_minutes: 15

# SMTP 配置（找回密码邮件）
smtp:
  # 是否启用真实发送（关闭时仅打印重置链接到日志）
  enabled: false
  # SMTP 服务器地址
  host: ""
  # SMTP 端口（465 通常为 SSL，587 通常为 STARTTLS）
  port: 465
  # 登录用户名
  user: ""
  # 登录密码 / 授权码
  password: ""
  # 发件人地址
  from_addr: "no-reply@myagent.local"
  # 是否使用 TLS
  use_tls: true

# Qdrant 配置
qdrant:
  # 连接地址（Docker Compose 内用服务名 qdrant）
  host: qdrant
  # REST 端口
  port: 6333
  # 集合（collection）名称
  collection_name: customer_service_knowledge
  # 向量维度（与嵌入模型对齐）
  vector_size: 1536
  # 距离度量方式：cosine | dot_product | euclidean
  distance: cosine
  # API Key（为空则不鉴权）
  api_key: ""
  # 是否启用（关闭时后端回退到模拟检索）
  enabled: true

# 日志配置
logging:
  # 日志级别：DEBUG | INFO | WARNING | ERROR
  level: DEBUG

  # 是否输出到控制台
  console: true

  # 是否写入文件
  file: true

  # 日志文件路径（相对于项目根目录）
  file_path: logs/app.log
