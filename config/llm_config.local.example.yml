# LLM 配置（本地覆盖，参考模板）
llm:
  # 是否启用 LLM 意图识别兜底
  enabled: true

  # OpenAI / 兼容 API 的密钥（替换为自己真实的 key）
  api_key: replace-with-local-key

  # 使用的模型名称
  model: gpt-5.5

  # 兼容 API 的 base URL（第三方网关地址）
  base_url: https://your-openai-compatible-gateway.example.com/v1

  # 请求超时时间（秒）
  timeout_seconds: 20.0

  # LLM 意图识别的最低置信度阈值（低于此值的结果会被丢弃）
  confidence_threshold: 0.7

  # 生成参数（可选；不填则用默认值）
  # 是否启用思维链（仅 Qwen3 等推理模型支持，经 extra_body 下发）。
  # 默认 false（关闭）以避免单次对话 20s 的推理开销；需强推理时置 true。
  enable_thinking: false
  # 采样温度（0~2，越大越随机）；留空用模型默认。
  temperature: 0.3
  # 单次回复最大 token 数；留空用模型默认。
  # max_tokens: 1024
  # 核采样概率阈值（0~1）；留空用模型默认。
  # top_p: 0.9

# RAG 配置
rag:
  # 检索策略：bm25 | semantic | hybrid
  retrieval_strategy: "hybrid"

  # 返回结果数量
  top_k: 5

  # 最小匹配度阈值（单一字段，读出即用，不做归一化映射）
  # 不同检索策略适用量纲不同，前端按 retrieval_strategy 控制可输入范围：
  #   - bm25    ：BM25(Modifier.IDF) 原始分数 0~10 量级，强命中约 4~6
  #   - semantic：余弦相似度 0~1
  #   - hybrid  ：RRF 融合分数约 1/(k+rank)，k=60 时最大 ~0.016，应接近 0
  # 默认 0.0 表示不按阈值过滤，仅取 top_k。
  min_score_threshold: 0.0

  # 切块参数（入库时生效，影响检索质量）
  chunk_size: 800        # 每个文本块最大字符数
  chunk_overlap: 100     # 硬切时相邻块重叠字符数
  min_chunk_size: 50     # 丢弃短于此长度的碎块

  # RRF 融合常数 k（仅 hybrid 策略生效），默认 60
  rrf_k: 60

  # Rerank 配置
  rerank:
    # 是否启用 Rerank
    enabled: false

    # Rerank 模型名称（启用时必填）
    model: ""

# Redis 配置
redis:
  # 连接地址（Docker Compose 内用服务名 redis）
  host: redis
  # 服务端口
  port: 6379
  # 数据库编号
  db: 0
  # 访问密码（为空则不鉴权）
  password: ""
  # 连接超时（秒）
  socket_timeout: 5.0
  # 是否启用（关闭时后端回退到内存存储）
  enabled: true

# MySQL 配置
mysql:
  # 连接地址（Docker Compose 内用服务名 mysql）
  host: mysql
  # 服务端口
  port: 3306
  # 数据库名
  database: myagent
  # 用户名
  user: myagent
  # 密码
  password: myagent
  # 连接池大小
  pool_size: 5
  # 连接超时（秒）
  connect_timeout: 10
  # 是否启用（关闭时后端回退到内存存储）
  enabled: true

# JWT 配置
jwt:
  # 签名密钥（生产环境务必替换为强随机值）
  secret: "change-me-in-prod"
  # 签名算法
  algorithm: "HS256"
  # 登录 token 有效期（分钟）
  access_expire_minutes: 1440
  # 找回密码 token 有效期（分钟）
  reset_expire_minutes: 15

# SMTP 配置（找回密码邮件）
smtp:
  # 是否启用真实发送（关闭时仅打印重置链接到日志）
  enabled: false
  # SMTP 服务器地址
  host: ""
  # SMTP 端口（465 通常为 SSL，587 通常为 STARTTLS）
  port: 465
  # 登录用户名
  user: ""
  # 登录密码 / 授权码
  password: ""
  # 发件人地址
  from_addr: "no-reply@myagent.local"
  # 是否使用 TLS
  use_tls: true

# Embedding 配置（基础设施，不由前端控制；rag 段由前端 PUT /rag/config 管理）
embedding:
  # 嵌入模型名称（OpenAI 兼容网关，如 DashScope text-embedding-v4）
  model: text-embedding-v4
  # API Key（rerank 复用同一 Key 进行网关鉴权）
  api_key: ""

# Qdrant 配置
qdrant:
  # 连接地址（Docker Compose 内用服务名 qdrant）
  host: qdrant
  # REST 端口
  port: 6333
  # 集合（collection）名称
  collection_name: customer_service_knowledge
  # 向量维度（与嵌入模型对齐）
  vector_size: 1536
  # 距离度量方式：cosine | dot_product | euclidean
  distance: cosine
  # API Key（为空则不鉴权）
  api_key: ""
  # 是否启用（关闭时后端回退到模拟检索）
  enabled: true

# 日志配置
logging:
  # 日志级别：DEBUG | INFO | WARNING | ERROR
  level: DEBUG

  # 是否输出到控制台
  console: true

  # 是否写入文件
  file: true

  # 日志输出目录（相对于项目根目录）
  # 文件命名：app-YYYY-MM-DD.log，按天切分，保留 14 天
  dir_path: logs

# 上下文管理配置（对话摘要缓冲，不由前端控制）
context:
  # 活动窗口大小：仅保留最近 N 条消息原样，窗口外折叠进 running_summary
  max_recent_messages: 6
  # running_summary 退化模式（无 LLM 折叠器）下的最大长度，避免无限增长
  max_summary_chars: 2000
